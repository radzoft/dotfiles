# ~/.config/mise/config.toml — global mise tools
# Managed by dotfiles (~/dotfiles)
# Docs: https://mise.jdx.dev/

[tools]
# ── JS / TS runtime + package manager ────────────────────────────────────────
bun  = "latest"   # package manager & runtime (replaces volta)
node = "22"       # LTS — some tools still need node explicitly

# ── Other runtimes ────────────────────────────────────────────────────────────
go   = "latest"
uv   = "latest"   # fast Python package runner

# ── Shell tools ───────────────────────────────────────────────────────────────
bat    = "latest"  # better cat
eza    = "latest"  # better ls
fzf    = "latest"  # fuzzy finder
tmux   = "latest"
zellij = "latest"
zoxide = "latest"  # smarter cd
usage  = "latest"  # mise task docs

# ── Search / find ─────────────────────────────────────────────────────────────
ripgrep = "latest"  # rg
fd      = "latest"  # fd-find

# ── Data ──────────────────────────────────────────────────────────────────────
jq = "latest"
yq = "latest"

# ── Git tools ─────────────────────────────────────────────────────────────────
gh       = "latest"  # GitHub CLI (replaces DNF gh)
delta    = "latest"  # better git diff (replaces DNF git-delta)
lazygit  = "latest"
