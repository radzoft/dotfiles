# mise.toml — dotfiles repo entry point
# Usage: mise run <task>
# Docs: https://mise.jdx.dev/tasks/

[tools]
# Tools needed to run the bootstrap itself
usage = "latest"

# ─── Bootstrap Tasks ──────────────────────────────────────────────────────────

[tasks.bootstrap]
description = "Full workstation bootstrap (run once on fresh install)"
depends = ["update", "packages", "link", "tools", "bun-globals", "gnome", "extensions", "services", "udev", "it87"]
# Note: autoforge removed — was a volta/bun global, no longer needed
run = """
echo ""
echo "✅  Bootstrap complete!"
echo "   Restart your session to apply GNOME changes."
echo "   Don't forget to: cp ~/dotfiles/home/.bashrc.secrets.template ~/.bashrc.secrets"
"""

[tasks.link]
description = "Symlink dotfiles via stow (home/ → ~/)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cd "$MISE_PROJECT_ROOT"

# Backup any conflicting files before stow
backup_if_exists() {
  local file="$HOME/$1"
  if [[ -f "$file" && ! -L "$file" ]]; then
    echo "  Backing up $file → $file.dotbak"
    mv "$file" "$file.dotbak"
  fi
}

backup_if_exists .bashrc
backup_if_exists .bash_profile
backup_if_exists .gitconfig
backup_if_exists .zshrc
backup_if_exists .config/mise/config.toml

echo "Symlinking dotfiles (stow home/ → ~/)"
stow --dir="$(pwd)" --target="$HOME" --restow home

# radzoft/.gitconfig lives outside the stow package (in the radzoft project dir)
mkdir -p "$HOME/radzoft"
if [[ ! -f "$HOME/radzoft/.gitconfig" ]]; then
  echo "Creating ~/radzoft/.gitconfig"
  cat > "$HOME/radzoft/.gitconfig" <<'EOF'
[user]
	email = glen@radzoft.com
	name = glen
EOF
fi

echo "✅  Dotfiles linked"
"""

[tasks.update]
description = "Upgrade all system packages (dnf update)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "→ Updating system packages..."
sudo dnf update -y
echo "✅  System up to date"
"""

[tasks.packages]
description = "Install DNF packages from system/packages.txt"
depends = ["update"]   # repos/deps must be current before adding new packages
run = "./scripts/install-packages.sh"

[tasks.flatpaks]
description = "Install Flatpak apps from system/flatpaks.txt"
run = "./scripts/install-flatpaks.sh"

[tasks.tools]
description = "Install mise-managed tools (bun, gh, delta, ripgrep, node, go…)"
depends = ["link"]   # ~/.config/mise/config.toml must be symlinked first
run = """
#!/usr/bin/env bash
# mise install reads ~/.config/mise/config.toml automatically (--config flag removed in newer mise)
mise install
echo "✅  Mise tools installed"
"""

[tasks.bun-globals]
description = "Install global JS tools via bun (claude, pi, autoforge, opencode…)"
depends = ["tools"]   # bun must be installed by mise first
run = """
#!/usr/bin/env bash
set -euo pipefail

BUN="${MISE_DATA_DIR:-$HOME/.local/share/mise}/shims/bun"
# Fall back to PATH bun if shim not found
command -v "$BUN" &>/dev/null || BUN="bun"

echo "Installing global bun packages..."
packages=(
  "@anthropic-ai/claude-code"   # claude CLI
  "@mariozechner/pi-coding-agent"  # pi coding agent
  "opencode-ai"                 # opencode
  "@devcontainers/cli"          # devcontainer
  "agent-browser"               # browser automation
)

for pkg in "${packages[@]}"; do
  echo "  → $pkg"
  "$BUN" add -g "$pkg"
done

echo "✅  Bun global packages installed (in ~/.bun/bin/)"
"""

[tasks.gnome]
description = "Restore GNOME keybindings, PaperWM settings and media keys"
run = "./scripts/restore-gnome.sh"

[tasks.extensions]
description = "Install GNOME extensions from gnome/extensions.txt"
run = "./scripts/install-extensions.sh"

[tasks.services]
description = "Enable systemd user services (mic-ttgo, autoforge)"
depends = ["link"]   # service unit files must be symlinked first
run = """
#!/usr/bin/env bash
set -euo pipefail
systemctl --user daemon-reload
for svc in mic-ttgo; do
  if systemctl --user list-unit-files "${svc}.service" &>/dev/null; then
    echo "Enabling $svc.service"
    systemctl --user enable --now "${svc}.service" || echo "  (skipped — check service file)"
  else
    echo "Warning: ${svc}.service not found (stow link may be missing)"
  fi
done
echo "✅  Services enabled"
"""

[tasks.it87]
description = "Install it87 hwmon driver via DKMS (requires sudo)"
depends = ["packages"]   # needs gcc, make, dkms, kernel-devel from packages
run = """
#!/usr/bin/env bash
set -euo pipefail

IT87_DIR="$HOME/oss/it87"
IT87_REPO="https://github.com/radzoft/it87.git"

# Clone if not present
if [[ ! -d "$IT87_DIR" ]]; then
  echo "Cloning it87 driver..."
  mkdir -p "$HOME/oss"
  git clone "$IT87_REPO" "$IT87_DIR"
else
  echo "it87 source found at $IT87_DIR — pulling latest..."
  git -C "$IT87_DIR" pull
fi

# Check if this version is already registered with DKMS
VERSION=$(git -C "$IT87_DIR" describe --long).$(date -u -d "$(git -C "$IT87_DIR" show -s --format=%ci HEAD)" +%Y%m%d)
if dkms status it87 2>/dev/null | grep -q "installed"; then
  echo "it87 already installed in DKMS:"
  dkms status it87
else
  echo "Installing it87 via DKMS..."
  cd "$IT87_DIR"
  sudo bash dkms-install.sh
fi

echo "✅  it87 driver installed (DKMS will auto-rebuild on kernel updates)"
"""

[tasks.btrfs-setup]
description = "Post-install btrfs subvolume setup (run once after fresh install, before bootstrap)"
run = "sudo bash $MISE_PROJECT_ROOT/scripts/setup-btrfs.sh"

[tasks.udev]
description = "Install udev rules (requires sudo)"
depends = ["packages"]   # avoids parallel sudo contention with packages task
run = """
#!/usr/bin/env bash
set -euo pipefail
RULES_DIR="$MISE_PROJECT_ROOT/system/udev"
echo "Installing udev rules from $RULES_DIR"
sudo cp "$RULES_DIR"/*.rules /etc/udev/rules.d/
sudo udevadm control --reload-rules
sudo udevadm trigger
echo "✅  Udev rules installed"
"""

[tasks.ttgo-warmup]
description = "Pre-warm the uv environment for ttgo2.py (caches pyserial venv)"
depends = ["tools"]
run = """
#!/usr/bin/env bash
set -euo pipefail
# uv run reads the PEP 723 inline metadata and creates an isolated venv.
# Running it once here caches the environment so the service starts instantly.
echo "Pre-warming uv env for ttgo2.py..."
uv run --no-project "$HOME/apps/ttgo2.py" --help 2>/dev/null || \
  uv run --no-project "$HOME/apps/ttgo2.py" &
sleep 3 && kill %1 2>/dev/null || true
echo "✅  uv env cached for ttgo2.py"
"""

# ─── Snapshot Task (run before upgrades) ─────────────────────────────────────

[tasks.snapshot]
description = "Snapshot current GNOME settings + package lists into repo"
run = """
#!/usr/bin/env bash
set -euo pipefail
REPO="$MISE_PROJECT_ROOT"

echo "Snapshotting GNOME settings..."
dconf dump /org/gnome/shell/extensions/paperwm/ > "$REPO/gnome/paperwm.dconf"
dconf dump /org/gnome/desktop/wm/keybindings/   > "$REPO/gnome/wm-keybindings.dconf"
dconf dump /org/gnome/settings-daemon/plugins/media-keys/ > "$REPO/gnome/media-keys.dconf"
gsettings get org.gnome.shell enabled-extensions \
  | tr ',' '\\n' | grep -oP "[\\w@\\.-]+" | sort > "$REPO/gnome/extensions.txt"

echo "Snapshotting qpwgraph..."
cp "$HOME/.config/rncbc.org/qpwgraph.conf" "$REPO/home/.config/rncbc.org/qpwgraph.conf"
# patchbay may still be at ~/Documents until 'mise run link' moves it
if [[ -f "$HOME/.config/rncbc.org/patch.qpwgraph" ]]; then
  cp "$HOME/.config/rncbc.org/patch.qpwgraph" "$REPO/home/.config/rncbc.org/patch.qpwgraph"
elif [[ -f "$HOME/Documents/patch.qpwgraph" ]]; then
  cp "$HOME/Documents/patch.qpwgraph" "$REPO/home/.config/rncbc.org/patch.qpwgraph"
else
  echo "  ⚠ patch.qpwgraph not found — skipping"
fi

echo "Snapshotting package lists..."
# Flatpaks
flatpak list --app --columns=application | sort > "$REPO/system/flatpaks.txt"

echo "✅  Snapshot complete — review changes then git commit"
"""
